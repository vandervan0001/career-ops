# Portal Scanner Configuration — Consulting-Ops (Swiss Automation/Pharma)
# Used by /consulting-ops scan to discover new mandats automatically.
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. WebSearch with site: filters (broad discovery, may be stale)
#   3. Direct career portal scraping (company-specific)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.
#
# HOW TO CUSTOMIZE:
#   1. Copy this file to portals.yml in the project root
#   2. Edit title_filter.positive with YOUR target role keywords
#   3. Add/remove companies in tracked_companies
#   4. Adjust search_queries for your preferred job boards
#   5. Set enabled: false on companies you don't care about
#
# GEO FOCUS: Suisse romande uniquement (Vaud, Genève, Fribourg, Neuchâtel, Valais)

# -- Title filter --
# The scanner uses these keywords to decide if a title is relevant.
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Automation / Control Systems --
    - "automation"
    - "automate"
    - "automatisation"
    - "Automatisierung"
    - "PLC"
    - "SCADA"
    - "DCS"
    - "OT"
    - "control system"
    - "système de contrôle"
    # -- Project Management --
    - "chef de projet"
    - "project manager"
    - "Projektleiter"
    # -- Pharma / Qualification --
    - "commissioning"
    - "qualification"
    - "pharma"
    - "GMP"
    - "CSV"
    - "validation"
    # -- Engineering roles --
    - "ingénieur système"
    - "systems engineer"
    - "ingénieur automation"
    - "automation engineer"
    - "process engineer"
    # -- Specific technologies --
    - "Siemens"
    - "Rockwell"
    - "WinCC"
    - "PCS7"
    - "TIA Portal"
    - "FactoryTalk"
    - "PlantPAx"
    - "DeltaV"
    - "Beckhoff"
    # -- MES / SCADA / Industrial IT --
    - "MES"
    - "historian"
    - "industrial IT"
    - "informatique industrielle"
    # -- OT Cybersecurity --
    - "cybersécurité industrielle"
    - "OT security"
    - "IEC 62443"
    # -- Industry 4.0 --
    - "Industry 4.0"
    - "Industrie 4.0"
    - "digitalisation"
    - "smart manufacturing"
  negative:
    # -- Too junior --
    - "stage"
    - "stagiaire"
    - "apprenti"
    - "apprentissage"
    - "junior"
    - "Praktikum"
    - "Ausbildung"
    - "Lehrling"
    # -- Wrong domain --
    - "développeur web"
    - "web developer"
    - "marketing"
    - "RH"
    - "ressources humaines"
    - "human resources"
    - "comptable"
    - "accounting"
    - "commercial"
    - "vente"
    - "sales"
    # -- Unrelated tech --
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "iOS"
    - "Android"
    - "PHP"
    - "Ruby"
  seniority_boost:
    # These prefixes add relevance but are not required
    - "senior"
    - "lead"
    - "principal"
    - "expert"
    - "Experte"
    - "architect"
    - "architecte"
    - "manager"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.
# The scanner extracts title, URL, and company from results.
# GEO: All queries target Suisse romande (Lausanne, Genève, Vaud, Fribourg, Neuchâtel)

search_queries:

  # -- jobs.ch (Suisse romande) --
  - name: "jobs.ch — Automation pharma Suisse romande"
    query: 'site:jobs.ch "automation" "pharma" Suisse romande'
    enabled: true

  - name: "jobs.ch — Automation Lausanne/Genève/Vaud/Fribourg/Neuchâtel"
    query: 'site:jobs.ch "automation" Lausanne OR Genève OR Vaud OR Fribourg OR Neuchâtel'
    enabled: true

  - name: "jobs.ch — Chef de projet pharma Suisse romande"
    query: 'site:jobs.ch "chef de projet" pharma "Suisse romande" OR Lausanne OR Genève OR Vaud'
    enabled: true

  - name: "jobs.ch — Ingénieur automation PLC Suisse romande"
    query: 'site:jobs.ch "ingénieur automation" OR "PLC" OR "SCADA" Lausanne OR Genève OR Vaud OR Fribourg'
    enabled: true

  # -- jobup.ch (Suisse romande) --
  - name: "jobup.ch — Automatisation Lausanne/Genève/Fribourg"
    query: 'site:jobup.ch automatisation Lausanne OR Genève OR Fribourg'
    enabled: true

  - name: "jobup.ch — Ingénieur automation PLC"
    query: 'site:jobup.ch "ingénieur automation" OR "PLC" OR "automate" Vaud OR Genève'
    enabled: true

  - name: "jobup.ch — OT cybersecurity Suisse romande"
    query: 'site:jobup.ch "OT" OR "cybersécurité" OR "IEC 62443" Suisse romande'
    enabled: true

  # -- indeed.ch (Suisse romande) --
  - name: "indeed.ch — Automation pharma freelance Suisse romande"
    query: 'site:indeed.ch "automation" "pharma" freelance Lausanne OR Genève OR Vaud'
    enabled: true

  - name: "indeed.ch — Chef de projet industriel Vaud"
    query: 'site:indeed.ch "chef de projet" industriel Vaud'
    enabled: true

  # -- linkedin.com/jobs (Suisse romande) --
  - name: "LinkedIn — Automation pharma Suisse romande/Lausanne/Geneva"
    query: 'site:linkedin.com/jobs automation pharma "Suisse romande" OR Lausanne OR Geneva'
    enabled: true

  - name: "LinkedIn — Project manager automation pharma Suisse romande"
    query: 'site:linkedin.com/jobs "project manager" automation pharma Lausanne OR Geneva OR Vaud'
    enabled: true

  # -- malt.ch --
  - name: "malt.ch — Automation industrielle Suisse romande"
    query: 'site:malt.ch "automation industrielle" Suisse romande OR Lausanne OR Genève'
    enabled: true

  # -- freelance.ch --
  - name: "freelance.ch — Automation OT pharma"
    query: 'site:freelance.ch "automation" OR "OT" pharma Suisse romande'
    enabled: true

  # -- hays.ch --
  - name: "hays.ch — Automation contractor pharma Suisse romande"
    query: 'site:hays.ch "automation" contractor OR freelance pharma Lausanne OR Genève OR Vaud'
    enabled: true

  # -- michaelpage.ch --
  - name: "michaelpage.ch — Ingénieur automation Suisse romande"
    query: 'site:michaelpage.ch "ingénieur automation" OR "automation engineer" Lausanne OR Genève OR Vaud'
    enabled: true

  # -- brunel.net --
  - name: "brunel.net — Automation pharma Suisse romande"
    query: 'site:brunel.net "automation" pharma Lausanne OR Genève OR Vaud OR "Suisse romande"'
    enabled: true

# -- Tracked companies --
# Companies whose career pages are checked directly.
# scan_method: websearch (default for consulting-ops)
